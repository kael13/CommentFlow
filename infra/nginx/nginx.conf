user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    client_max_body_size 1m;

    # ──────────────────────────────────────────
    # Gzip Compression
    # ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ──────────────────────────────────────────
    # Rate Limiting Zones
    # ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=ip_global:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ip_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ip_api:10m rate=60r/s;

    # ──────────────────────────────────────────
    # Connection Limiting
    # ──────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ──────────────────────────────────────────
    # Upstream: API Gateway
    # ──────────────────────────────────────────
    upstream api_gateway {
        server api-gateway:3000;
    }

    # ──────────────────────────────────────────
    # Upstream: Frontend
    # ──────────────────────────────────────────
    upstream frontend {
        server frontend:80;
    }

    # ──────────────────────────────────────────
    # HTTP -> HTTPS redirect
    # ──────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ──────────────────────────────────────────
    # HTTPS Server
    # ──────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # ── TLS Configuration ──
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.3;
        ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security Headers ──
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://*.firebase.com; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin" always;

        # ── Connection Limit ──
        limit_conn conn_per_ip 20;

        # ── Block dangerous file extensions ──
        location ~* \.(env|git|sql|log|md|key|pem)$ {
            deny all;
            return 404;
        }

        # ── API Proxy ──
        location /api/ {
            limit_req zone=ip_api burst=20 nodelay;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Login Rate Limiting ──
        location /api/auth/login {
            limit_req zone=ip_login burst=3 nodelay;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket Support ──
        location /ws {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # ── Frontend Static Files ──
        location / {
            limit_req zone=ip_global burst=40 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;
        }
    }
}
