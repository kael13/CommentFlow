SecRuleEngine On

SecRequestBodyAccess On
SecResponseBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 1048576
SecResponseBodyLimitAction ProcessPartial

SecTmpDir /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data
SecUploadDir /tmp/modsecurity/upload

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

SecArgumentSeparator &
SecCookieFormat 0

SecUnicodeMapFile unicode.mapping 20127

SecStatusEngine Off

# ──────────────────────────────────────────────
# OWASP Core Rule Set (CRS)
# ──────────────────────────────────────────────
# Reference the OWASP CRS rules - these must be installed separately
# Download from: https://github.com/coreruleset/coreruleset

Include /etc/nginx/modsecurity/crs/crs-setup.conf
Include /etc/nginx/modsecurity/crs/rules/*.conf

# ──────────────────────────────────────────────
# Custom Rules
# ──────────────────────────────────────────────
# Block common SQL injection patterns
SecRule ARGS "@detectSQLi" \
    "id:1001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SQL Injection Detected',\
    tag:'attack-sqli',\
    severity:'CRITICAL'"

# Block common XSS patterns
SecRule ARGS "@detectXSS" \
    "id:1002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XSS Attack Detected',\
    tag:'attack-xss',\
    severity:'CRITICAL'"

# Block requests with suspicious user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?:nikto|sqlmap|nmap|masscan|dirbuster)" \
    "id:1003,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Suspicious Scanner Detected',\
    tag:'scanner-detection',\
    severity:'WARNING'"
