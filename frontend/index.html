<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>CommentFlow — Dashboard</title>
  <!-- Bulma CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg"></div>
    <div class="login-container">
      <div class="login-card">
        <div class="login-card-icon">
          <i class="fas fa-comment-dots"></i>
        </div>
        <h2 class="login-title">CommentFlow</h2>
        <p class="login-subtitle">Smart Facebook Comment Monitoring</p>
        <button id="login-btn" class="login-facebook-btn">
          <span class="login-facebook-icon"><i class="fab fa-facebook"></i></span>
          <span>Sign in with Facebook</span>
        </button>
        <p class="login-footer">Powered by Firebase Auth</p>
      </div>
    </div>
  </div>

  <!-- Dashboard Layout -->
  <div id="dashboard" class="dashboard" style="display: none;">
    <!-- Navbar -->
    <nav class="navbar" id="main-topbar">
      <div class="navbar-brand">
        <a class="navbar-item dashboard-title"><i class="fas fa-comment-dots"></i> CommentFlow</a>
      </div>
      <div class="navbar-menu">
        <div class="navbar-end">
          <div class="navbar-item" id="autopilot-toggle-wrapper">
            <label class="autopilot-switch">
              <span class="autopilot-label"><i class="fas fa-robot"></i> Autopilot</span>
              <label class="toggle-switch is-small">
                <input type="checkbox" id="autopilot-switch">
                <span class="toggle-slider"></span>
              </label>
            </label>
          </div>
          <a class="navbar-item" id="notif-bell">
            <i class="fas fa-bell"></i> <span class="tag is-danger is-rounded" id="notif-count">0</span>
          </a>
          <a class="navbar-item" id="user-menu">
            <img id="user-avatar" src="" alt="" class="avatar"> <span id="user-name"></span> <i class="fas fa-caret-down"></i>
          </a>
        </div>
      </div>
    </nav>

    <div class="columns is-gapless" style="min-height: calc(100vh - 49px);">
      <!-- Sidebar Navigation -->
      <div class="column is-2 sidebar">
        <ul class="menu" id="sidebar-nav">
          <li class="is-active" data-page="inbox"><a href="#inbox"><i class="fas fa-inbox"></i> <span>Smart Inbox</span></a></li>
          <li data-page="leads"><a href="#leads"><i class="fas fa-bullseye"></i> <span>Lead Capture</span></a></li>
          <li data-page="analytics"><a href="#analytics"><i class="fas fa-chart-bar"></i> <span>Analytics</span></a></li>
          <li data-page="moderation"><a href="#moderation"><i class="fas fa-shield-alt"></i> <span>Moderation</span></a></li>
          <li data-page="rules"><a href="#rules"><i class="fas fa-sliders-h"></i> <span>AI Rules</span></a></li>
          <li data-page="viral"><a href="#viral"><i class="fas fa-fire"></i> <span>Viral Detector</span></a></li>
          <li data-page="autopilot"><a href="#autopilot"><i class="fas fa-microchip"></i> <span>Autopilot</span></a></li>
          <li class="divider"></li>
          <li id="logout-btn"><a href="#"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="column is-10 main-content" id="main-content">
        <div id="page-inbox" class="page active"></div>
        <div id="page-leads" class="page"></div>
        <div id="page-analytics" class="page"></div>
        <div id="page-moderation" class="page"></div>
        <div id="page-rules" class="page"></div>
        <div id="page-viral" class="page"></div>
        <div id="page-autopilot" class="page"></div>
      </div>
    </div>
  </div>

  <!-- Lead Detail Modal -->
  <div class="modal" id="lead-modal">
    <div class="modal-background" onclick="closeModal('lead-modal')"></div>
    <div class="modal-content">
      <div class="box">
        <h4 class="title is-5 mb-4"><span class="icon"><i class="fas fa-bullseye"></i></span><span>Lead Details</span></h4>
        <div id="lead-detail-content"></div>
      </div>
    </div>
    <button class="modal-close is-large" onclick="closeModal('lead-modal')"></button>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Modal Helpers -->
  <script>
    function openModal(id) { document.getElementById(id).classList.add('is-active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('is-active'); }
  </script>
  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/inbox.js"></script>
  <script src="js/pages/leads.js"></script>
  <script src="js/pages/analytics.js"></script>
  <script src="js/pages/moderation.js"></script>
  <script src="js/pages/rules.js"></script>
  <script src="js/pages/viral.js"></script>
  <script src="js/pages/autopilot.js"></script>
</body>
</html>
